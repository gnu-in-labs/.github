name: Feature
description: Propose an improvement
labels: ["kind:feature"]
body:
  - type: textarea
    attributes:
      label: Problem to solve
      description: What gets better if this exists?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
  - type: textarea
    attributes:
      label: Verification or evidence
      description: What would prove this is useful, safe, or ready?
