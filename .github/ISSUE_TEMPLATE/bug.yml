name: Bug
description: Report incorrect behavior
labels: ["kind:bug"]
body:
  - type: textarea
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Include commands, URLs, screenshots, or environment details when useful.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Logs, screenshots, or context
  - type: textarea
    attributes:
      label: Risk boundary
      description: Does this touch security, public claims, automation, release, shell execution, or live runtime behavior?
