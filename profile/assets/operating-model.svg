<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GNU.IN operating model diagram</title>
  <desc id="desc">A five step diagram showing human intent, agent drafting, source control, verification, and human-gated promotion.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071013"/>
      <stop offset="0.5" stop-color="#111B1D"/>
      <stop offset="1" stop-color="#20161D"/>
    </linearGradient>
    <linearGradient id="rail" x1="138" y1="180" x2="1064" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#55D6BE"/>
      <stop offset="0.34" stop-color="#F2C14E"/>
      <stop offset="0.68" stop-color="#F78154"/>
      <stop offset="1" stop-color="#B48EED"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#panel)"/>
  <path d="M140 180 H1060" stroke="url(#rail)" stroke-width="5" stroke-linecap="round"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g>
      <rect x="72" y="86" width="184" height="184" rx="22" fill="#0E171A" stroke="#55D6BE" stroke-opacity="0.52"/>
      <circle cx="164" cy="180" r="26" fill="#55D6BE" fill-opacity="0.18" stroke="#55D6BE"/>
      <text x="164" y="187" text-anchor="middle" fill="#D7FFF1" font-size="20" font-weight="800">1</text>
      <text x="164" y="232" text-anchor="middle" fill="#F7FBF7" font-size="18" font-weight="800">Human intent</text>
      <text x="164" y="256" text-anchor="middle" fill="#B8CBC5" font-size="13">goals, limits, stop rules</text>
    </g>
    <g>
      <rect x="294" y="86" width="184" height="184" rx="22" fill="#0E171A" stroke="#F2C14E" stroke-opacity="0.52"/>
      <circle cx="386" cy="180" r="26" fill="#F2C14E" fill-opacity="0.18" stroke="#F2C14E"/>
      <text x="386" y="187" text-anchor="middle" fill="#FFE3A3" font-size="20" font-weight="800">2</text>
      <text x="386" y="232" text-anchor="middle" fill="#F7FBF7" font-size="18" font-weight="800">Agent draft</text>
      <text x="386" y="256" text-anchor="middle" fill="#B8CBC5" font-size="13">inspect, plan, propose</text>
    </g>
    <g>
      <rect x="516" y="86" width="184" height="184" rx="22" fill="#0E171A" stroke="#F78154" stroke-opacity="0.52"/>
      <circle cx="608" cy="180" r="26" fill="#F78154" fill-opacity="0.18" stroke="#F78154"/>
      <text x="608" y="187" text-anchor="middle" fill="#FFD0C2" font-size="20" font-weight="800">3</text>
      <text x="608" y="232" text-anchor="middle" fill="#F7FBF7" font-size="18" font-weight="800">Source control</text>
      <text x="608" y="256" text-anchor="middle" fill="#B8CBC5" font-size="13">branches, PRs, review</text>
    </g>
    <g>
      <rect x="738" y="86" width="184" height="184" rx="22" fill="#0E171A" stroke="#B48EED" stroke-opacity="0.52"/>
      <circle cx="830" cy="180" r="26" fill="#B48EED" fill-opacity="0.18" stroke="#B48EED"/>
      <text x="830" y="187" text-anchor="middle" fill="#E7D9FF" font-size="20" font-weight="800">4</text>
      <text x="830" y="232" text-anchor="middle" fill="#F7FBF7" font-size="18" font-weight="800">Verification</text>
      <text x="830" y="256" text-anchor="middle" fill="#B8CBC5" font-size="13">tests, build evidence</text>
    </g>
    <g>
      <rect x="960" y="86" width="184" height="184" rx="22" fill="#0E171A" stroke="#FFFFFF" stroke-opacity="0.42"/>
      <circle cx="1052" cy="180" r="26" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.76"/>
      <text x="1052" y="187" text-anchor="middle" fill="#F7FBF7" font-size="20" font-weight="800">5</text>
      <text x="1052" y="232" text-anchor="middle" fill="#F7FBF7" font-size="18" font-weight="800">Promotion gate</text>
      <text x="1052" y="256" text-anchor="middle" fill="#B8CBC5" font-size="13">human approval, rollback</text>
    </g>
  </g>
</svg>
